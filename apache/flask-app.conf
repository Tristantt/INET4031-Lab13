<VirtualHost *:80>

    ProxyPreserveHost On

    # Flask API routes
    ProxyPass /api http://app.ticket-app:5000/api
    ProxyPassReverse /api http://app.ticket-app:5000/api

    ProxyPass /health http://app.ticket-app:5000/health
    ProxyPassReverse /health http://app.ticket-app:5000/health

    # Everything else goes to static frontend
    ProxyPass / !

    DocumentRoot /var/www/html

</VirtualHost>
